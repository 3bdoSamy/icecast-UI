services:
  icecast:
    image: moul/icecast
    container_name: icecast
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data/icecast/icecast.xml:/etc/icecast2/icecast.xml
      - ./data/icecast/logs:/var/log/icecast2

  backend:
    build: ./backend
    container_name: icecast_backend
    restart: unless-stopped
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ICECAST_ADMIN_USER=${ICECAST_ADMIN_USER}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD}
      - ICECAST_ADMIN_URL=http://127.0.0.1:8000
      - ICECAST_STATS_URL=http://127.0.0.1:8000/status-json.xsl
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./data/icecast:/data/icecast
      - /usr/local/etc:/usr/local/etc
      - ./data/control:/data/control
      - /etc/nginx:/etc/nginx
      - /etc/ssl:/etc/ssl
      - /etc/letsencrypt:/etc/letsencrypt
      - /usr/bin/systemctl:/usr/bin/systemctl:ro
      - /usr/sbin/nginx:/usr/sbin/nginx:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
    network_mode: host
      - ICECAST_ADMIN_URL=http://icecast:8000
      - ICECAST_STATS_URL=http://icecast:8000/status-json.xsl
      - JWT_SECRET=${JWT_SECRET}
      - COMPOSE_FILE=/app/docker-compose.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./data/icecast:/data/icecast
    ports:
      - "8001:8001"
    depends_on:
      - icecast

  frontend:
    build: ./frontend
    container_name: icecast_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: icecast_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
